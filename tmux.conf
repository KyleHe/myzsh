# ============================================
# 基础设置
# ============================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on                          # 支持鼠标滚动/选择
set -s escape-time 0                     # 减少按键延迟
set -g renumber-windows on               # 关闭窗口后自动重排编号
set -g set-clipboard on                  # 支持系统剪贴板

# ============================================
# 会话恢复核心配置
# ============================================
set -g @plugin 'tmux-plugins/tmux-resurrect'   # 保存/恢复会话
set -g @plugin 'tmux-plugins/tmux-continuum'   # 自动定时保存
set -g @plugin 'tmux-plugins/tmux-logging'     # 使用日志插件
set -g @logging-path "~/Documents/tmux_logs"   # 配置日志目录

# resurrect 设置：保存什么内容
set -g @resurrect-capture-pane-contents 'on'   # 保存 pane 内的输出内容
set -g @resurrect-strategy-vim 'session'       # 尝试恢复 vim 会话
set -g @resurrect-strategy-nvim 'session'      # 尝试恢复 neovim 会话
set -g @resurrect-save-shell-history 'on'      # 保存 shell 历史

# continuum 设置：自动保存
set -g @continuum-restore 'on'                 # 重启 tmux 后自动恢复
set -g @continuum-save-interval '15'           # 每 15 分钟自动保存一次
# 窗口编号从 1 开始（更符合直觉）
set -g base-index 1

# ============================================
# Ruby 开发常用快捷键
# ============================================
# 前缀键改为 Ctrl+a（更方便按，和 Rails 的 C-a 不冲突是因为前缀需要双击）
# 如果你习惯 C-b，可以删掉这行
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# 重新加载配置
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 新建屏幕继承当前目录
bind c new-window -c "#{pane_current_path}"

# 新建主目录屏幕
bind ` new-window -c "~"

# 分屏快捷键（更直观）
bind | split-window -h -c "#{pane_current_path}"   # 竖屏
bind - split-window -v -c "#{pane_current_path}"   # 横屏

# 启用扩展键支持
set-option -g extended-keys on

# 使用 Option + h/j/k/l 在窗格间导航
# bind-key -n M-h select-pane -L
# bind-key -n M-j select-pane -D
# bind-key -n M-k select-pane -U
# bind-key -n M-l select-pane -R
# 绑定 Option + 1..9 切换到对应的窗口
# bind-key -n M-1 select-window -t 1
# bind-key -n M-2 select-window -t 2
# bind-key -n M-3 select-window -t 3
# bind-key -n M-4 select-window -t 4
# bind-key -n M-5 select-window -t 5
# bind-key -n M-6 select-window -t 6
# bind-key -n M-7 select-window -t 7
# bind-key -n M-8 select-window -t 8
# bind-key -n M-9 select-window -t 9

# 快速创建 Rails 常用 pane
bind R new-window -n "rails" \; \
  send-keys "rails server" Enter \; \
  split-window -h -c "#{pane_current_path}" \; \
  send-keys "rails console" Enter \; \
  split-window -v -c "#{pane_current_path}" \; \
  send-keys "git status --short" Enter

# 复制模式增强（支持 vim 风格）
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ============================================
# 外观设置（可选）
# ============================================
set -g status-position top               # 状态栏放顶部（习惯）
set -g status-style "bg=black,fg=white"
set -g status-left "[#S] "
set -g status-right "#{pane_current_command}  %H:%M "
set -g window-status-current-style "bg=cyan,fg=black,bold"
run '~/.tmux/plugins/tpm/tpm'
